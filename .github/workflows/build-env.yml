name: Build & Release Conda Env

on:
  push:
    tags: ['envs-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. envs-v1)'
        required: true
        default: 'envs-v1'

jobs:
  build-env:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.10'
          miniconda-version: latest
          auto-activate-base: true

      - name: Create conda env
        shell: bash -el {0}
        run: |
          conda create -p ./env python=3.10 -y

      - name: Install core packages
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            pip pandas matplotlib 'numpy<2.0.0' biopython scipy seaborn \
            libgfortran5 tqdm ffmpeg fsspec \
            -c conda-forge -y

      - name: Install ML packages
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            chex dm-haiku 'flax<0.10.0' dm-tree joblib ml-collections immutabledict optax \
            -c conda-forge -y

      - name: Install JAX
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            'jax>=0.4,<=0.6.0' 'jaxlib>=0.4,<=0.6.0' \
            -c conda-forge -y

      - name: Install PyRosetta (optional)
        shell: bash -el {0}
        continue-on-error: true
        run: |
          conda install -p ./env pyrosetta pdbfixer \
            --channel https://conda.graylab.jhu.edu -c conda-forge -y

      - name: Install pip packages
        shell: bash -el {0}
        run: |
          ./env/bin/pip install fastmcp==2.13.1 loguru click
          ./env/bin/pip install --ignore-installed fastmcp
          ./env/bin/pip install git+https://github.com/sokrypton/ColabDesign.git --no-deps || true

      - name: Pack environment
        shell: bash -el {0}
        run: |
          conda install -n base conda-pack -y
          $(conda info --base)/bin/conda-pack -p ./env -o bindcraft_mcp-env.tar.gz --ignore-editable-packages

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Conda Environment ${{ steps.tag.outputs.tag }}"
          body: |
            Pre-packaged conda environment for `bindcraft_mcp`.

            **Usage in quick_setup.sh:**
            ```bash
            USE_PACKED_ENVS=1 bash quick_setup.sh
            ```

            **Usage in Google Colab:**
            ```python
            import os, subprocess
            url = "https://github.com/<owner>/<repo>/releases/download/${{ steps.tag.outputs.tag }}/bindcraft_mcp-env.tar.gz"
            subprocess.run(["wget", "-q", url])
            os.makedirs("bindcraft_mcp/env", exist_ok=True)
            subprocess.run(["tar", "xzf", "bindcraft_mcp-env.tar.gz", "-C", "bindcraft_mcp/env"])
            subprocess.run(["bash", "-c", "source bindcraft_mcp/env/bin/activate && conda-unpack"])
            ```

            > **Note:** PyRosetta may not be included if the license was unavailable during build.
            > AlphaFold2 weights (~5.3 GB) are NOT included — download separately with `quick_setup.sh`.
          files: bindcraft_mcp-env.tar.gz
          fail_on_unmatched_files: true
