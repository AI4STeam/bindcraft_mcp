name: Build & Release Conda Env

on:
  push:
    tags: ['envs-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. envs-v1)'
        required: true
        default: 'envs-v1'

jobs:
  build-env:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.10'
          miniconda-version: latest
          auto-activate-base: true

      - name: Create conda env
        shell: bash -el {0}
        run: |
          conda create -p ./env python=3.10 -y

      - name: Install core packages
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            pip pandas matplotlib 'numpy<2.0.0' biopython scipy seaborn \
            libgfortran5 tqdm ffmpeg fsspec \
            -c conda-forge -y

      - name: Install ML packages
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            chex dm-haiku 'flax<0.10.0' dm-tree joblib ml-collections immutabledict optax \
            -c conda-forge -y

      - name: Install JAX
        shell: bash -el {0}
        run: |
          conda install -p ./env \
            'jax>=0.4,<=0.6.0' 'jaxlib>=0.4,<=0.6.0' \
            -c conda-forge -y

      - name: Install PyRosetta (optional)
        shell: bash -el {0}
        continue-on-error: true
        run: |
          conda install -p ./env pyrosetta pdbfixer \
            --channel https://conda.graylab.jhu.edu -c conda-forge -y

      - name: Install pip packages
        shell: bash -el {0}
        run: |
          ./env/bin/pip install fastmcp==2.13.1 loguru click
          ./env/bin/pip install --ignore-installed fastmcp
          ./env/bin/pip install git+https://github.com/sokrypton/ColabDesign.git --no-deps || true

      - name: Pack environment
        shell: bash -el {0}
        run: |
          conda install -n base conda-pack -y
          $(conda info --base)/bin/conda-pack -p ./env -o bindcraft_mcp-env.tar.gz --ignore-editable-packages

      - name: Split archive if larger than 1.9 GB
        run: |
          FILE=bindcraft_mcp-env.tar.gz
          MAX_BYTES=$((1900 * 1024 * 1024))  # 1.9 GB to stay under 2 GB limit
          FILE_SIZE=$(stat --format=%s "$FILE")
          echo "Archive size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -gt "$MAX_BYTES" ]; then
            echo "Archive exceeds 1.9 GB — splitting into parts..."
            split -b 1900m "$FILE" "${FILE}.part-"
            rm "$FILE"
            ls -lh ${FILE}.part-*
            echo "split=true" >> $GITHUB_ENV
          else
            echo "Archive fits in single file ($FILE_SIZE bytes)"
            echo "split=false" >> $GITHUB_ENV
          fi

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Conda Environment ${{ steps.tag.outputs.tag }}"
          body: |
            Pre-packaged conda environment for `bindcraft_mcp`.

            **Download & Install:**
            ```bash
            # If single file:
            wget -q https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/bindcraft_mcp-env.tar.gz
            mkdir -p bindcraft_mcp/env
            tar xzf bindcraft_mcp-env.tar.gz -C bindcraft_mcp/env
            source bindcraft_mcp/env/bin/activate && conda-unpack

            # If split into parts (files named *.part-aa, *.part-ab, ...):
            cat bindcraft_mcp-env.tar.gz.part-* > bindcraft_mcp-env.tar.gz
            mkdir -p bindcraft_mcp/env
            tar xzf bindcraft_mcp-env.tar.gz -C bindcraft_mcp/env
            source bindcraft_mcp/env/bin/activate && conda-unpack
            ```

            > **Note:** PyRosetta may not be included if the license was unavailable during build.
            > AlphaFold2 weights (~5.3 GB) are NOT included — download separately with `quick_setup.sh`.
          files: |
            bindcraft_mcp-env.tar.gz
            bindcraft_mcp-env.tar.gz.part-*
          fail_on_unmatched_files: false
